services:
  backend:
    build: ./backend
    container_name: proxmox-admin-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SESSION_SECRET=${SESSION_SECRET:-}
      - INSTALL_DIR=/opt/proxmox-admin
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/proxmox-admin:/opt/proxmox-admin
    networks:
      - proxmox-admin

  frontend:
    build: ./frontend
    container_name: proxmox-admin-ui
    restart: unless-stopped
    ports:
      - "7320:80"
    depends_on:
      - backend
    networks:
      - proxmox-admin

networks:
  proxmox-admin:
    driver: bridge
